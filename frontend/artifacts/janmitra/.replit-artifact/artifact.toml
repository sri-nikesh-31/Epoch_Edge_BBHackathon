kind = "web"
previewPath = "/"
title = "JanMitra – RBI Policy Assistant"
version = "1.0.0"
id = "artifacts/janmitra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22480

[services.development]
run = "pnpm --filter @workspace/janmitra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/janmitra", "run", "build" ]
publicDir = "artifacts/janmitra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22480"
BASE_PATH = "/"
